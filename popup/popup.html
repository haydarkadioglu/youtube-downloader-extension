<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>YouTube Downloader</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎬 YouTube Downloader</h1>
      <p class="subtitle">Powered by yt-dlp (native)</p>
    </div>

    <div id="native-status" class="native-status"></div>

    <div id="video-info" class="video-info" style="display:none;">
      <div class="video-row">
        <p id="video-title" class="video-title"></p>
        <button id="refresh-btn" class="icon-btn" title="Refresh">🔄</button>
      </div>
      <p id="playlist-badge" class="playlist-badge" style="display:none;">📋 Playlist detected</p>
    </div>

    <div class="format-selector">
      <label class="format-option">
        <input type="radio" name="format" value="mp4" checked>
        <div class="format-card">
          <span class="format-icon">🎬</span>
          <span class="format-label">MP4 Video</span>
          <span class="format-desc">Best quality</span>
        </div>
      </label>
      <label class="format-option">
        <input type="radio" name="format" value="mp3">
        <div class="format-card">
          <span class="format-icon">🎵</span>
          <span class="format-label">MP3 Audio</span>
          <span class="format-desc">Extract audio</span>
        </div>
      </label>
    </div>

    <button id="download-btn" class="download-btn">⬇️ Download</button>
    <div id="status" class="status"></div>
    
    <div class="footer">
      <span>Need yt-dlp?</span>
      <a id="setup-link" href="#">Setup Guide</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
